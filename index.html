<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnHit</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
      line-height: 1.6;
      color: #94a3b8;
    }
    .highlight {
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OnHit</h1>
    <p>
      OnHit is a modern sports application designed to support a wide range of activities,
      with a strong focus on <span class="highlight">tennis</span>.
    </p>
    <p>
      We're building tools to connect players, track performance, and elevate your game.
    </p>
    <p>
      <strong>Launching soon.</strong>
    </p>
  </div>

</html>
