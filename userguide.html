<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">

<title>Help Center</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f6f7f9;
        color: #333;
    }

    header {
        background: #1f2a37;
        color: white;
        padding: 20px;
        text-align: center;
    }

    main {
        max-width: 900px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
    }

    section {
        margin-bottom: 40px;
    }

    h1, h2 {
        color: #1f2a37;
    }

    /* =========================
       PRO SLIDER (SCROLL SNAP)
    ========================== */

    .slider-wrapper {
        margin-top: 20px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;

        display: flex;
        gap: 0;

        border-radius: 12px;
        background: #f9fafb;

        scroll-behavior: smooth;
    }

    .slider-wrapper::-webkit-scrollbar {
        display: none;
    }

    .slide {
        flex: 0 0 100%;
        scroll-snap-align: center;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        padding: 20px;
        min-height: 340px;
    }

    .slide img {
        width: 220px;
        max-width: 80%;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        margin-bottom: 15px;
        display: block;
    }

    .slide h3 {
        margin: 10px 0 5px;
    }

    .slide p {
        margin: 0;
        font-size: 14px;
        color: #666;
        text-align: center;
    }

    /* Controls */
    .controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
    }

    button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #1f2a37;
        color: white;
    }

    button:active {
        transform: scale(0.97);
    }

    /* Dots */
    .dots {
        display: flex;
        justify-content: center;
        margin-top: 10px;
        gap: 6px;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ccc;
    }

    .dot.active {
        background: #1f2a37;
    }
</style>
</head>

<body>

<header>
    <h1>Help Center</h1>
</header>

<main>

<section>
    <h2>Create Account</h2>
    <p>Follow steps below.</p>

    <div class="slider-wrapper" id="slider">

        <div class="slide">
            <img src="images/SignUp_1_CountrySelection.jpg">
            <h3>Step 1</h3>
            <p>Select your country</p>
        </div>

        <div class="slide">
            <img src="images/SignUp_2_ChooseYourDisplayName.jpg">
            <h3>Step 2</h3>
            <p>Choose username</p>
        </div>

        <div class="slide">
            <img src="images/SignUp_3_ProvideEmail.jpg">
            <h3>Step 3</h3>
            <p>Provide email</p>
        </div>

        <div class="slide">
            <img src="images/SignUp_4_ProvideSport.jpg">
            <h3>Step 4</h3>
            <p>Select sport</p>
        </div>

        <div class="slide">
            <img src="images/SignUp_5_ProvideRole.jpg">
            <h3>Step 5</h3>
            <p>Choose role</p>
        </div>

        <div class="slide">
            <img src="images/SignUp_6_AcceptTerms.jpg">
            <h3>Step 6</h3>
            <p>Accept terms</p>
        </div>

        <div class="slide">
            <img src="images/SignUp_7_SummaryAndCreate.jpg">
            <h3>Step 7</h3>
            <p>Create account</p>
        </div>

    </div>

    <div class="controls">
        <button onclick="prev()">Previous</button>
        <button onclick="next()">Next</button>
    </div>

    <div class="dots" id="dots"></div>
</section>

</main>

<script>
const slider = document.getElementById("slider");
const slides = document.querySelectorAll(".slide");
const total = slides.length;

let index = 0;

// dots
const dotsContainer = document.getElementById("dots");

for (let i = 0; i < total; i++) {
    const dot = document.createElement("div");
    dot.classList.add("dot");
    dotsContainer.appendChild(dot);
}

const dots = document.querySelectorAll(".dot");

function updateDots() {
    dots.forEach((d, i) => d.classList.toggle("active", i === index));
}

function goTo(i) {
    index = (i + total) % total;
    slider.scrollTo({
        left: index * slider.clientWidth,
        behavior: "smooth"
    });
    updateDots();
}

function next() {
    goTo(index + 1);
}

function prev() {
    goTo(index - 1);
}

// detect manual scroll (mobile swipe)
slider.addEventListener("scroll", () => {
    const newIndex = Math.round(slider.scrollLeft / slider.clientWidth);
    if (newIndex !== index) {
        index = newIndex;
        updateDots();
    }
});

updateDots();
</script>

</body>
</html>
